name: EKS Bootstrap

on:
  workflow_dispatch:
    inputs:
      cluster:
        description: "EKS cluster name"
        required: true
        type: choice
        options:
          - eks-dev-us-east-1
        default: eks-dev-us-east-1
      region:
        description: "AWS region"
        required: true
        type: choice
        options:
          - us-east-1
        default: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    name: Bootstrap EKS Cluster Tools
    runs-on: [self-hosted, docker, linux]

    env:
      CLUSTER_NAME:       ${{ inputs.cluster }}
      AWS_REGION:         ${{ inputs.region }}
      ARGOCD_NAMESPACE:   argocd
      ROLLOUTS_NAMESPACE: argo-rollouts
      LBC_ROLE_ARN:       arn:aws:iam::497041484428:role/AmazonEKSLoadBalancerControllerRole
      VPC_ID:             vpc-08b7f3452f8161d71
      ACM_CERT_ARN:       arn:aws:acm:us-east-1:497041484428:certificate/aeb50a3f-01af-4fbc-9165-45acde587dee
      HOSTED_ZONE_ID:     Z0109380NA1UD90BNT9T

    steps:
      # ─────────────────────────────────────────
      # Step 1: Auth & Kubeconfig
      # ─────────────────────────────────────────
      - name: Configure AWS credentials (OIDC — keyless)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set kubeconfig to EKS cluster
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$CLUSTER_NAME"

      # ─────────────────────────────────────────
      # Step 2: Pre-flight cleanup
      # Removes orphaned cluster-scoped resources
      # and unblocks stuck Terminating namespaces
      # Safe to re-run — all commands use || true
      # ─────────────────────────────────────────
      - name: Pre-flight cleanup
        run: |
          # Unblock any stuck Terminating namespaces
          for ns in argocd argo-rollouts staging production; do
            PHASE=$(kubectl get namespace "$ns" -o jsonpath='{.status.phase}' 2>/dev/null || true)
            if [ "$PHASE" = "Terminating" ]; then
              echo "Unblocking stuck namespace: $ns"

              # Clear stuck ingress finalizers
              kubectl get ingress -n "$ns" -o name 2>/dev/null | \
                xargs -I{} kubectl patch {} -n "$ns" \
                  --type=json -p='[{"op":"remove","path":"/metadata/finalizers"}]' \
                  2>/dev/null || true

              # Clear namespace finalizers via finalize API
              kubectl get namespace "$ns" -o json 2>/dev/null | \
                jq '.spec.finalizers = []' | \
                kubectl replace --raw "/api/v1/namespaces/$ns/finalize" -f - \
                2>/dev/null || true

              kubectl wait --for=delete "namespace/$ns" --timeout=60s 2>/dev/null || true
              echo "Namespace $ns cleared"
            fi
          done

          # Remove orphaned ArgoCD cluster-scoped resources
          for res in argocd-application-controller argocd-applicationset-controller \
                     argocd-server argocd-repo-server; do
            kubectl delete clusterrole "$res" 2>/dev/null || true
            kubectl delete clusterrolebinding "$res" 2>/dev/null || true
          done

          # Remove orphaned Argo Rollouts cluster-scoped resources
          for res in argo-rollouts argo-rollouts-aggregate-to-admin \
                     argo-rollouts-aggregate-to-edit argo-rollouts-aggregate-to-view; do
            kubectl delete clusterrole "$res" 2>/dev/null || true
          done
          kubectl delete clusterrolebinding argo-rollouts 2>/dev/null || true

          echo "Pre-flight cleanup complete"

      # ─────────────────────────────────────────
      # Step 3: Add Helm repos
      # ─────────────────────────────────────────
      - name: Add Helm repositories
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo add eks  https://aws.github.io/eks-charts
          helm repo update

      # ─────────────────────────────────────────
      # Step 4: Install ArgoCD
      # ─────────────────────────────────────────
      - name: Install ArgoCD
        run: |
          helm upgrade --install argocd argo/argo-cd \
            --namespace "$ARGOCD_NAMESPACE" \
            --create-namespace \
            --set server.service.type=ClusterIP \
            --set configs.params."server\.insecure"=true \
            --wait --timeout=300s

      # ─────────────────────────────────────────
      # Step 5: Install Argo Rollouts
      # ─────────────────────────────────────────
      - name: Install Argo Rollouts
        run: |
          helm upgrade --install argo-rollouts argo/argo-rollouts \
            --namespace "$ROLLOUTS_NAMESPACE" \
            --create-namespace \
            --wait --timeout=120s

      # ─────────────────────────────────────────
      # Step 6: Install AWS Load Balancer Controller
      # ─────────────────────────────────────────
      - name: Install AWS Load Balancer Controller
        run: |
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName="$CLUSTER_NAME" \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$LBC_ROLE_ARN" \
            --set region="$AWS_REGION" \
            --set vpcId="$VPC_ID" \
            --wait --timeout=120s

      # ─────────────────────────────────────────
      # Step 7: Apply ArgoCD Ingress (ALB)
      # One-time bootstrap — ArgoCD manages all
      # other Ingresses via GitOps after this
      # ─────────────────────────────────────────
      - name: Apply ArgoCD Ingress
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: argocd-ingress
            namespace: ${ARGOCD_NAMESPACE}
            annotations:
              alb.ingress.kubernetes.io/scheme: internet-facing
              alb.ingress.kubernetes.io/target-type: ip
              alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
              alb.ingress.kubernetes.io/ssl-redirect: "443"
              alb.ingress.kubernetes.io/certificate-arn: ${ACM_CERT_ARN}
              alb.ingress.kubernetes.io/backend-protocol: HTTP
              alb.ingress.kubernetes.io/group.name: platform
          spec:
            ingressClassName: alb
            rules:
              - host: argocd.devopscab.com
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: argocd-server
                          port:
                            number: 80
          EOF

      # ─────────────────────────────────────────
      # Step 8: Wait for ALB to be provisioned
      # ─────────────────────────────────────────
      - name: Wait for ArgoCD ALB
        run: |
          echo "Waiting for ALB hostname (up to 5 min)..."
          HOSTNAME=""
          for i in $(seq 1 30); do
            HOSTNAME=$(kubectl get ingress argocd-ingress -n "$ARGOCD_NAMESPACE" \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$HOSTNAME" ]; then
              echo "ALB provisioned: $HOSTNAME"
              break
            fi
            echo "  attempt $i/30 — waiting 10s..."
            sleep 10
          done
          if [ -z "$HOSTNAME" ]; then
            echo "WARNING: ALB not provisioned within 5 minutes."
            echo "Check AWS LBC logs: kubectl logs -n kube-system -l app.kubernetes.io/name=aws-load-balancer-controller"
          fi

      # ─────────────────────────────────────────
      # Step 9: Update Route 53 CNAME
      # ─────────────────────────────────────────
      - name: Update Route 53 — argocd.devopscab.com
        run: |
          HOSTNAME=$(kubectl get ingress argocd-ingress -n "$ARGOCD_NAMESPACE" \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)

          if [ -z "$HOSTNAME" ]; then
            echo "Skipping Route 53 — ALB hostname not available yet"
            exit 0
          fi

          aws route53 change-resource-record-sets \
            --hosted-zone-id "$HOSTED_ZONE_ID" \
            --change-batch "{\"Changes\":[{\"Action\":\"UPSERT\",\"ResourceRecordSet\":{\"Name\":\"argocd.devopscab.com\",\"Type\":\"CNAME\",\"TTL\":300,\"ResourceRecords\":[{\"Value\":\"${HOSTNAME}\"}]}}]}"

          echo "Route 53 updated: argocd.devopscab.com -> ${HOSTNAME}"

      # ─────────────────────────────────────────
      # Step 10: Print access details
      # ─────────────────────────────────────────
      - name: Print ArgoCD access info
        run: |
          echo "============================================"
          echo " ArgoCD Bootstrap Complete"
          echo "============================================"
          echo " URL      : https://argocd.devopscab.com"
          echo " Username : admin"
          echo -n " Password : "
          kubectl -n "$ARGOCD_NAMESPACE" get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d
          echo ""
          echo "============================================"
