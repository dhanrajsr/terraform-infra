name: Terraform

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "Cloud provider"
        required: true
        type: choice
        options: [aws, azure, gcp]
      environment:
        description: "Environment"
        required: true
        type: choice
        options: [dev, sit, uat, prod]
      action:
        description: "Terraform action"
        required: true
        type: choice
        options: [plan, apply, destroy]

permissions:
  id-token: write    # Required for OIDC token exchange
  contents: read
  pull-requests: write

# ─────────────────────────────────────────────────────────────
# AWS — EKS
# ─────────────────────────────────────────────────────────────
jobs:
  terraform-aws:
    name: "Terraform · AWS · ${{ inputs.environment || 'dev' }}"
    runs-on: [self-hosted, docker, linux]
    if: ${{ github.event_name == 'push' || inputs.cloud == 'aws' }}

    defaults:
      run:
        working-directory: aws/us-east-1/${{ inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — keyless)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Verify Terraform
        run: terraform version

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: aws/us-east-1/${{ inputs.environment || 'dev' }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -no-color
        continue-on-error: true
        env:
          TF_VAR_school_db_password: ${{ secrets.SCHOOL_DB_PASSWORD }}

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### AWS Terraform Plan 📋
            \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Apply
        if: inputs.action == 'apply' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
        env:
          TF_VAR_school_db_password: ${{ secrets.SCHOOL_DB_PASSWORD }}

      # ── Cilium installed via helm CLI (not Terraform) ──────────────────
      # Helm provider cannot authenticate before cluster exists at init time.
      # Using helm CLI after cluster is ready is the reliable approach.
      - name: Update kubeconfig
        if: inputs.action == 'apply' && github.ref == 'refs/heads/main'
        run: |
          aws eks update-kubeconfig \
            --region us-east-1 \
            --name eks-${{ inputs.environment || 'dev' }}-us-east-1

      - name: Install Cilium via Helm
        if: inputs.action == 'apply' && github.ref == 'refs/heads/main'
        run: |
          helm repo add cilium https://helm.cilium.io/
          helm repo update
          helm upgrade --install cilium cilium/cilium \
            --version 1.16.0 \
            --namespace kube-system \
            --set eni.enabled=true \
            --set ipam.mode=eni \
            --set egressMasqueradeInterfaces=eth0 \
            --set tunnel=disabled \
            --set kubeProxyReplacement=true \
            --wait --timeout 5m

      - name: Verify Cilium status
        if: inputs.action == 'apply' && github.ref == 'refs/heads/main'
        run: |
          kubectl -n kube-system rollout status daemonset/cilium --timeout=120s

      - name: Terraform Destroy
        if: inputs.action == 'destroy' && github.ref == 'refs/heads/main'
        run: terraform destroy -auto-approve

# ─────────────────────────────────────────────────────────────
# Azure — AKS
# ─────────────────────────────────────────────────────────────
  terraform-azure:
    name: "Terraform · Azure · ${{ inputs.environment || 'dev' }}"
    runs-on: [self-hosted, docker, linux]
    if: ${{ github.event_name == 'push' || inputs.cloud == 'azure' }}

    defaults:
      run:
        working-directory: azure/eastus/${{ inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Azure credentials (OIDC — keyless)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Terraform
        run: terraform version

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -no-color
        continue-on-error: true
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Azure Terraform Plan 📋
            \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Apply
        if: inputs.action == 'apply' && github.ref == 'refs/heads/main'
        run: terraform apply tfplan
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"

      - name: Terraform Destroy
        if: inputs.action == 'destroy' && github.ref == 'refs/heads/main'
        run: terraform destroy -auto-approve
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"

# ─────────────────────────────────────────────────────────────
# GCP — GKE
# ─────────────────────────────────────────────────────────────
  terraform-gcp:
    name: "Terraform · GCP · ${{ inputs.environment || 'dev' }}"
    runs-on: [self-hosted, docker, linux]
    if: ${{ github.event_name == 'push' || inputs.cloud == 'gcp' }}

    defaults:
      run:
        working-directory: gcp/us-east1/${{ inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GCP credentials (OIDC — keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Verify Terraform
        run: terraform version

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -no-color
        continue-on-error: true

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### GCP Terraform Plan 📋
            \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Apply
        if: inputs.action == 'apply' && github.ref == 'refs/heads/main'
        run: terraform apply tfplan

      - name: Terraform Destroy
        if: inputs.action == 'destroy' && github.ref == 'refs/heads/main'
        run: terraform destroy -auto-approve
