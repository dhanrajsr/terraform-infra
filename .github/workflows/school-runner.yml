name: Build School Runner Image

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to Docker Hub"
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: Build & Push School Runner Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push school runner image
        uses: docker/build-push-action@v6
        with:
          context: school-runner
          file: school-runner/Dockerfile
          push: ${{ inputs.push_image }}
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/github-runner-school:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/github-runner-school:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print next step
        run: |
          echo "============================================"
          echo "Image pushed. To start school runners:"
          echo ""
          echo "  cd terraform-infra/school-runner"
          echo "  export RUNNER_TOKEN_SCHOOL_API=<token>"
          echo "  export RUNNER_TOKEN_SCHOOL_API_LAMBDA=<token>"
          echo "  export RUNNER_TOKEN_SCHOOL_UI=<token>"
          echo "  docker compose -f docker-compose.runner.yml up -d"
          echo ""
          echo "Get tokens from each repo:"
          echo "  Settings → Actions → Runners → New self-hosted runner → copy token"
          echo "============================================"
