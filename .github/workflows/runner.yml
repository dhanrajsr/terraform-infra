name: Build GitHub Runner Image

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to Docker Hub"
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: Build & Push Runner Image
    runs-on: ubuntu-latest                  # GitHub-hosted — no self-hosted needed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: runner
          file: runner/Dockerfile
          push: ${{ inputs.push_image }}
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/github-runner-terraform:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/github-runner-terraform:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print next step
        run: |
          echo "============================================"
          echo "Image pushed. To start the runner locally:"
          echo ""
          echo "  cd terraform-infra/runner"
          echo "  RUNNER_TOKEN=<token-from-github> \\"
          echo "    docker compose -f docker-compose.runner.yml up -d"
          echo ""
          echo "Get token: terraform-infra → Settings → Actions → Runners → New self-hosted runner"
          echo "============================================"
