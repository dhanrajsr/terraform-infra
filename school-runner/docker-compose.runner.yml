services:

  runner-school-api:
    image: dhanrajsubbaianind/github-runner-school:latest
    container_name: github-runner-school-api
    restart: unless-stopped
    environment:
      REPO_URL:       https://github.com/dhanrajsr/school-api
      RUNNER_TOKEN:   ${RUNNER_TOKEN_SCHOOL_API}
      RUNNER_NAME:    docker-runner-school-api
      RUNNER_WORKDIR: /tmp/runner/work
      LABELS:         self-hosted,docker,linux
      RUNNER_SCOPE:   repo
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - school_api_work:/tmp/runner/work

  runner-school-api-lambda:
    image: dhanrajsubbaianind/github-runner-school:latest
    container_name: github-runner-school-api-lambda
    restart: unless-stopped
    environment:
      REPO_URL:       https://github.com/dhanrajsr/school-api-lambda
      RUNNER_TOKEN:   ${RUNNER_TOKEN_SCHOOL_API_LAMBDA}
      RUNNER_NAME:    docker-runner-school-api-lambda
      RUNNER_WORKDIR: /tmp/runner/work
      LABELS:         self-hosted,docker,linux
      RUNNER_SCOPE:   repo
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - school_api_lambda_work:/tmp/runner/work

  runner-school-ui:
    image: dhanrajsubbaianind/github-runner-school:latest
    container_name: github-runner-school-ui
    restart: unless-stopped
    environment:
      REPO_URL:       https://github.com/dhanrajsr/school-ui
      RUNNER_TOKEN:   ${RUNNER_TOKEN_SCHOOL_UI}
      RUNNER_NAME:    docker-runner-school-ui
      RUNNER_WORKDIR: /tmp/runner/work
      LABELS:         self-hosted,docker,linux
      RUNNER_SCOPE:   repo
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - school_ui_work:/tmp/runner/work

volumes:
  school_api_work:
  school_api_lambda_work:
  school_ui_work:
